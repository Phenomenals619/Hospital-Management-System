<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="layout(title,content)"
>
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../static/css/style.css" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title th:replace="${title}"></title>
  </head>
  <body>
    <!--Navbar-->
    <nav class="navbar navbar-expand-lg navbar-light bg-success">
      <div class="container-fluid">
        <a class="navbar-brand" href="/"
          ><i class="fa-regular fa-hospital"></i> HMS</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <form class="d-flex col-sm-2 w-75">
            <input
              class="form-control ms-3 0"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button
              class="btn btn-dark fa-solid fa-magnifying-glass"
              type="submit"
            ></button>
          </form>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item" th:if="${session.role != 'admin'}">
              <a
                class="nav-link active text-white"
                aria-current="page"
                th:href="@{/admin}"
                >ADMIN</a
              >
            </li>
            <li class="nav-item" th:if="${session.role != 'admin'}">
              <a
                class="nav-link active text-white"
                aria-current="page"
                th:href="@{/doctor}"
                >DOCTOR</a
              >
            </li>
            <li class="nav-item" th:if="${session.role != 'admin'}">
              <a class="nav-link active text-white" th:href="@{/userRegister}"
                >USER</a
              >
            </li>

            <div class="dropdown me-2" th:if="${session.role == 'admin'}">
              <button
                class="btn btn-warning dropdown-toggle"
                type="button"
                id="dropdownMenuButton1"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                DOCTOR
              </button>
              <ul
                class="dropdown-menu"
                style="width: 2px"
                aria-labelledby="dropdownMenuButton1"
              >
                <li>
                  <a class="dropdown-item" th:href="@{/addDoctor}"
                    >Add Doctor</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" th:href="@{/viewDoctor}"
                    >View Doctor</a
                  >
                </li>
              </ul>
            </div>
            <!--Admin dropdown-->
            <div class="dropdown me-2" th:if="${session.role == 'admin'}">
              <button
                class="btn btn-secondary dropdown-toggle"
                type="button"
                id="dropdownMenuButton1"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                ADMIN
              </button>
              <ul
                class="dropdown-menu"
                style="width: 2px"
                aria-labelledby="dropdownMenuButton1"
              >
                <li>
                  <a class="dropdown-item" href="#">Profile</a>
                </li>
                <li>
                  <a class="dropdown-item" th:href="@{/logout}">Logout</a>
                </li>
              </ul>
            </div>
          </ul>
        </div>
      </div>
    </nav>

    <div th:if="${session.role == 'admin' }"></div>
    <!--Dynamic content-->
    <div th:replace="${content}"></div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
        -->
  </body>
</html>
