<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-success">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <i class="fa-regular fa-hospital"></i> HMS
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <form class="d-flex col-sm-2 w-75">
            <input
              class="form-control ms-3"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button
              class="btn btn-dark fa-solid fa-magnifying-glass"
              type="submit"
            ></button>
          </form>

          <div class="dropdown ms-3">
            <button
              class="btn btn-danger dropdown-toggle"
              type="button"
              id="dropdownMenuButton2"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              APPOINTMENT
            </button>
            <ul
              class="dropdown-menu dropdown-menu-dark"
              aria-labelledby="dropdownMenuButton2"
            >
              <li>
                <a class="dropdown-item active" th:href="@{/takeApp}">Take Appointment</a>
              </li>
              <li><a class="dropdown-item" th:href="@{/takeApp}">View Appointment</a></li>
            </ul>
          </div>

          <div class="btn-group ms-auto">
            <button
              class="btn btn-info btn-md dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <i class="fa-regular fa-user me-1"></i>
              <span th:text="${userName}"></span>
            </button>

            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
              <li><a class="dropdown-item" href="#">Profile</a></li>
              <li>
                <a class="dropdown-item" th:href="@{/logout}">Logout</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>
