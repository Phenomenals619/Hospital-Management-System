<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
th:replace="~{base :: layout( ~{::title}, ~{::section})}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View All Doctors</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-body">
                        <div th:class="${doctors == null} ? 'hidden' : ''">
                            <h1 class="text-center mb-4">Doctors List</h1>
                            <table class="table table-bordered table-striped">
                              <thead>
                                <tr>
                                  <th>ID</th>
                                  <th>Name</th>
                                  <th>Email</th>
                                  <th>Specialization</th>
                                </tr>
                              </thead>
                              <tbody>
                                <tr th:each="doctor : ${doctors}">
                                  <td th:text="${doctor.id}"></td>
                                  <td th:text="${doctor.name}"></td>
                                  <td th:text="${doctor.email}"></td>
                                  <td th:text="${doctor.specialization}"></td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                    </div>
                </div>
            </div>
        </div>
      
    </section>
  </body>
</html>
